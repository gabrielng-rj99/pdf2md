[pytest]
# Configuração do pytest para PDF-to-Markdown-with-Images

# Diretório de testes
testpaths = tests

# Padrão de arquivos de teste
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Opções padrão
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Markers personalizados
markers =
    unit: testes unitários
    integration: testes de integração
    e2e: testes end-to-end
    slow: testes que demoram
    api: testes de API
    filter: testes do filtro de imagens
    pdf: testes de processamento de PDF

# Timeout para testes (em segundos)
timeout = 300

# Cobertura mínima
# min_coverage = 70

# Log
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
