# ==============================================================================
# PDF-to-Markdown-with-Images - Application Configuration
# ==============================================================================
# IMPORTANTE: Este arquivo centraliza TODOS os parâmetros da aplicação
# Não use valores hardcoded no código - leia daqui
# ==============================================================================

# ==============================================================================
# SEÇÃO 1: UPLOAD DE ARQUIVOS
# ==============================================================================

[UPLOAD]

# Tamanho máximo de arquivo em MB
# Recomendado: 500MB para VPN caseira
# Aumentar com cuidado - consome memória
max_file_size_mb = 500

# Extensões de arquivo permitidas (vírgula separado)
# Deixar vazio = todas as extensões .pdf
allowed_extensions = .pdf

# Diretório temporário para uploads (relativo a /app ou absoluto)
temp_dir = /tmp

# Limpeza automática de arquivos temporários após X minutos
# 0 = desabilitar limpeza automática
temp_cleanup_minutes = 60

# ==============================================================================
# SEÇÃO 2: SERVIDOR HTTP
# ==============================================================================

[SERVER]

# Host para bind (0.0.0.0 = qualquer interface)
host = 0.0.0.0

# Porta (8000 em desenvolvimento, via nginx em produção)
port = 8000

# Modo debug (true/false)
debug = false

# Timeout de requisição em segundos
request_timeout_seconds = 300

# ==============================================================================
# SEÇÃO 3: PROCESSAMENTO DE PDFs
# ==============================================================================

[PROCESSING]

# Número de threads para processamento paralelo
# Recomendação: 2 * CPU_cores
worker_threads = 4

# Timeout por arquivo em segundos
# PDFs grandes podem precisar mais tempo
pdf_processing_timeout_seconds = 120

# DPI para extração de imagens
# Maior = qualidade melhor, mas mais pesado
dpi = 150

# Qualidade JPEG de saída (0-100)
# Maior = melhor qualidade, arquivo maior
jpeg_quality = 85

# Formato de saída de imagens (jpeg, png, webp)
output_image_format = jpeg

# ==============================================================================
# SEÇÃO 4: PROCESSAMENTO DE IMAGENS - FILTRO INTELIGENTE
# ==============================================================================

[IMAGE_FILTER]

# Habilitar filtro inteligente de imagens
# true = remove cabeçalhos, rodapés, bordas
# false = mantém todas as imagens
enable_filter = true

# Percentual do topo da página considerado cabeçalho (0.0 a 1.0)
# 0.10 = 10% superior
header_margin_percent = 0.10

# Percentual do rodapé da página (0.0 a 1.0)
# 0.10 = 10% inferior
footer_margin_percent = 0.10

# Percentual das margens laterais (0.0 a 1.0)
# 0.02 = 2% de cada lado
side_margin_percent = 0.02

# Área mínima em pixels quadrados para considerar uma imagem relevante
# Imagens menores que isso são descartadas
min_image_area = 3000

# Percentual de pixels "vazios" (brancos/transparentes) permitido
# 0.5 = 50% máximo de pixels vazios (imagem vazia = descartada)
max_empty_pixel_ratio = 0.5

# ==============================================================================
# SEÇÃO 5: MARKDOWN - FORMATAÇÃO
# ==============================================================================

[MARKDOWN]

# Usar cabeçalho (headings) automático
# true = detecta estrutura de headings do PDF
auto_headings = true

# Incluir número de página nos comentários
include_page_numbers = true

# Tipo de quebra de página
# simple = linha em branco
# comment = comentário <!-- Page X -->
# separator = markdown separator (---)
page_break_style = comment

# Nível máximo de heading (1-6)
# Títulos maiores serão limitados a este nível
max_heading_level = 3

# ==============================================================================
# SEÇÃO 6: CORS - Controle de Origem
# ==============================================================================

[CORS]

# Origens permitidas (comma separated)
# * = qualquer origem (CUIDADO: apenas local/VPN!)
allow_origins = *

# Permitir credentials (cookies, etc)
allow_credentials = true

# Métodos HTTP permitidos
allow_methods = GET,POST,PUT,DELETE,OPTIONS

# Headers permitidos
allow_headers = Content-Type,Authorization

# Headers expostos ao cliente
expose_headers = Content-Length,Content-Type

# Tempo de cache para preflight requests (segundos)
max_age = 3600

# ==============================================================================
# SEÇÃO 7: LOGGING
# ==============================================================================

[LOGGING]

# Nível de log (DEBUG, INFO, WARNING, ERROR, CRITICAL)
level = INFO

# Formato de log
# simple = timestamp level message
# detailed = timestamp level module message
format = detailed

# Arquivo de log (deixar vazio para stdout apenas)
file =

# Tamanho máximo do arquivo de log em MB (0 = unlimited)
max_file_size_mb = 100

# Número de backups de log a manter
backup_count = 5

# ==============================================================================
# SEÇÃO 8: SEGURANÇA
# ==============================================================================

[SECURITY]

# Habilitar rate limiting
rate_limiting_enabled = false

# Requests máximo por minuto por IP
rate_limit_requests_per_minute = 60

# Habilitar validação de PDF
pdf_validation_enabled = true

# Scanear PDFs com ClamAV (requer ClamAV instalado)
clamav_scan_enabled = false

# Timeout do ClamAV em segundos
clamav_timeout_seconds = 30

# ==============================================================================
# SEÇÃO 9: CACHE
# ==============================================================================

[CACHE]

# Habilitar cache de resultados processados
cache_enabled = false

# Diretório de cache
cache_dir = /app/cache

# Tempo de expiração do cache em horas
cache_expiration_hours = 24

# Tamanho máximo do cache em MB
cache_max_size_mb = 500

# ==============================================================================
# SEÇÃO 10: SAÍDA E ARMAZENAMENTO
# ==============================================================================

[OUTPUT]

# Diretório de saída para PDFs processados e imagens
output_dir = /app/output

# Nomes dos arquivos de saída
# {timestamp} = data/hora
# {filename} = nome original do PDF
# {hash} = hash SHA256 do arquivo
output_format = {filename}_{timestamp}

# Incluir timestamp em nomes de arquivo
include_timestamp = true

# Usar hash do arquivo no nome (evita colisões)
use_file_hash = false

# Estratégia de colisão de nomes
# skip = pula se já existe
# overwrite = sobrescreve
# rename = adiciona sufixo
collision_strategy = rename

# ==============================================================================
# SEÇÃO 11: FEATURES EXPERIMENTAIS
# ==============================================================================

[EXPERIMENTAL]

# Habilitar OCR (se Tesseract instalado)
ocr_enabled = false

# Idioma para OCR
ocr_language = por+eng

# Habilitar processamento assíncrono (Celery, etc)
async_processing = false

# ==============================================================================
# NOTAS IMPORTANTES
# ==============================================================================

# 1. VALORES NUMÉRICOS
#    - Booleanos: true/false (lowercase)
#    - Percentuais: 0.0 a 1.0 (ex: 0.10 = 10%)
#    - Tamanhos: em MB ou pixels
#    - Timeout: em segundos
#
# 2. CAMINHOS
#    - Paths começando com / = absolutos
#    - Outros = relativos a /app (dentro do container)
#
# 3. PERFORMANCE
#    - worker_threads: aumentar para múltiplos cores
#    - dpi: diminuir para mais velocidade, qualidade menor
#    - jpeg_quality: diminuir para arquivos menores
#
# 4. MEMÓRIA
#    - max_file_size_mb: limitar para evitar OOM
#    - cache_max_size_mb: limitar tamanho do cache
#    - GUNICORN_WORKERS em .env: diminuir se pouca RAM
#
# 5. SEGURANÇA
#    - allow_origins = * : APENAS em rede privada/VPN
#    - rate_limiting_enabled: habilitar para acesso público
#    - pdf_validation_enabled: sempre manter true
#
# 6. TROUBLESHOOTING
#    - Aumentar level de logging para DEBUG se houver problemas
#    - Verificar /app/output se imagensnão aparecem
#    - Ver logs em docker logs extract-pdf
#
# ==============================================================================
