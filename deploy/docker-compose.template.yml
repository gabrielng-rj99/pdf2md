version: "3.8"

###########################
# docker-compose template #
# - Replace ${VAR} values via a .env file or inline before using.
# - Minimal explanations: "network_mode: host" -> container uses host network (no isolation).
#                         "external: true" -> use an existing docker network created outside compose.
###########################

services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: "${APP_IMAGE:-extract-pdf:latest}"
    container_name: "${APP_CONTAINER_NAME:-extract-pdf}"
    restart: unless-stopped
    environment:
      - ENV=${ENV:-production}
      - PYTHONUNBUFFERED=1
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-4}
    # Expose internal port to the Docker network only
    expose:
      - "${APP_INTERNAL_PORT:-8000}"
    # Networking: choose one of the two options below. By default we attach to the 'app_net' network
    networks:
      app_net:
        ipv4_address: ${APP_INTERNAL_IP:-172.18.0.200}
    volumes:
      - ${HOST_OUTPUT_DIR:-../output}:/app/output:rw
      - ${HOST_CONFIG_INI:-../config.ini}:/app/config.ini:ro
      - ${HOST_TEST_FILES_DIR:-../test_files}:/app/test_files:ro

  nginx:
    image: "${NGINX_IMAGE:-nginx:stable}"
    container_name: "${NGINX_CONTAINER_NAME:-extract-pdf-nginx}"
    restart: unless-stopped
    depends_on:
      - app
    # By default the nginx container is attached to the same Docker network
    networks:
      app_net:
        ipv4_address: ${NGINX_INTERNAL_IP:-172.18.0.201}
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ${CERT_DIR:-./certs}:/etc/nginx/certs:ro
      - ./log:/var/log/nginx:rw
    # If you want nginx to bind host ports, uncomment the `ports:` block below and
    # set HOST_BIND_IP (empty binds all interfaces).
    #
    # ports:
    #   - "${HOST_BIND_IP:-0.0.0.0}:${EXPOSE_HTTP_PORT:-80}:${EXPOSE_HTTP_PORT:-80}"
    #   - "${HOST_BIND_IP:-0.0.0.0}:${EXPOSE_HTTPS_PORT:-443}:${EXPOSE_HTTPS_PORT:-443}"
    #
    # Minimal explanation:
    # - To expose ports on the host (so other machines on the LAN can reach the service),
    #   enable the ports block. If you prefer isolation, leave it commented (access via Docker network).

# Optional helper to run init tasks (network creation, cert generation, build). Not started by default.
# You can implement an external script (e.g., deploy/init.sh) to:
#  - create the docker network (if needed)
#  - build images (docker compose build)
#  - generate self-signed certs into deploy/certs/
#  - docker compose up -d
#  - and cleanup certs on docker-compose down
#
# Example invocation is documented in docs/README_CLEAN.md (add an init.sh to automate).

# Networks
networks:
  # Default internal network created by compose (bridge)
  app_net:
    driver: bridge
    ipam:
      config:
        - subnet: "${NETWORK_SUBNET:-172.18.0.0/24}"
          gateway: "${NETWORK_GATEWAY:-172.18.0.1}"

  # If you already created a network manually and want compose to use it, add an external block:
  # external_app_net:
  #   external: true          # minimal: this tells compose to not create the network but use an existing one
  #   name: ${EXTERNAL_NETWORK_NAME:-my_existing_network}
  #
  # Minimal explanation:
  # - Use `external: true` when you have already created a docker network (docker network create ...)
  #   and want containers to join that existing network (useful for reusing host/macvlan or shared nets).
