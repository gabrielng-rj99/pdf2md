# Nginx reverse proxy configuration for PDF-to-Markdown-with-Images
# Place this file at: deploy/nginx/conf.d/default.conf
#
# Notes:
# - This configuration is tailored for the internal domain pdf2md.home.arpa
# - SSL certificate and key are expected at:
#     /etc/nginx/certs/pdf2md.home.arpa.crt
#     /etc/nginx/certs/pdf2md.home.arpa.key
# - The upstream application container is named "app" in docker-compose
#   and listens on port 8000. Nginx will proxy requests to http://app:8000.
# - Ensure this nginx container and the app container share the same Docker network.
# - The ACME challenge location is mapped to /var/www/acme in docker-compose for cert issuance (if used).
#

# Map directive for WebSocket support (must be at http context level)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Redirect all HTTP to HTTPS (preserve Host and original URI)
server {
    listen 80;
    listen [::]:80;
    server_name pdf2md.home.arpa;

    # Allow Let's Encrypt ACME challenge to be served directly
    location /.well-known/acme-challenge/ {
        root /var/www/acme;
        # Let companion or certbot write challenge files here
        try_files $uri =404;
    }

    # Redirect other requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server: proxy to backend app
server {
    listen 443 ssl;
    http2 on;
    listen [::]:443 ssl;
    server_name pdf2md.home.arpa;

    # Path to certificate and key for pdf2md.home.arpa
    ssl_certificate     /etc/nginx/certs/pdf2md.home.arpa.crt;
    ssl_certificate_key /etc/nginx/certs/pdf2md.home.arpa.key;

    # SSL hardening (modern defaults)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers "EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH";
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;

    # HSTS (enable after verifying HTTPS is working)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' data:; object-src 'none';" always;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Allow large uploads (tune as needed)
    client_max_body_size 500M;
    client_body_buffer_size 128k;

    # Proxy settings
    location / {
        # Proxy to the application container by service name on the same Docker network
        proxy_pass http://app:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Timeouts and buffering
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        send_timeout 120s;

        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;

        # Preserve client request body on large uploads
        proxy_request_buffering off;
    }

    # Expose a simple health-check endpoint for reverse-proxy to test backend
    location /_healthz {
        proxy_pass http://app:8000/_healthz;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Serve ACME challenge from the shared directory as well (for cert renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/acme;
        try_files $uri =404;
    }
}

# Fallback server block: redirect unknown hosts on HTTP to HTTPS
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}
