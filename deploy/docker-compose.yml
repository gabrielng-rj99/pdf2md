# PDF2MD Docker Compose

# AVISO IMPORTANTE:
# 🔒 RECOMENDAÇÃO DE SEGURANÇA:
# Bloqueie o acesso à rede interna pelo host principal via firewall!
# Exemplo iptables (legacy):
#   sudo iptables -I DOCKER-USER -d 172.18.1.0/24 -j DROP
# Exemplo nftables (moderno):
#   sudo nft add rule inet filter output ip daddr 172.18.1.0/24 drop
#   sudo nft add rule inet filter forward ip daddr 172.18.1.0/24 drop
# (Adapte para sua tabela e chain conforme sua configuração)

services:
    app:
        build:
            context: ..
            dockerfile: deploy/Dockerfile
        image: "${APP_IMAGE:-extract-pdf:latest}"
        container_name: "${APP_CONTAINER_NAME:-extract-pdf}"
        restart: unless-stopped
        environment:
            - ENV=${ENV:-production}
            - PYTHONUNBUFFERED=1
            - GUNICORN_WORKERS=${GUNICORN_WORKERS:-4}
        ports: [] # NÃO expõe porta pro host principal!
        expose:
            - "${APP_PORT:-8000}"
        volumes:
            - app_output:/app/output:rw
            - ${HOST_CONFIG_INI:-../config.ini}:/app/config.ini:ro
        networks:
            app_internal:
                ipv4_address: ${APP_IP:-172.18.1.10}

    nginx:
        image: "${NGINX_IMAGE:-nginx:stable}"
        container_name: "${NGINX_CONTAINER_NAME:-extract-pdf-nginx}"
        restart: unless-stopped
        depends_on:
            - app
        ports: [] # NÃO expõe porta pro host principal!
        expose:
            - "${HTTP_PORT:-80}"
            - "${HTTPS_PORT:-443}"
        volumes:
            - ./nginx/conf.d:/etc/nginx/conf.d:ro
            - ${CERT_DIR:-./certs}:/etc/nginx/certs:ro
            - ./log:/var/log/nginx:rw
        networks:
            app_internal:
                ipv4_address: ${NGINX_INTERNAL_IP:-172.18.1.11}
            app_external:
                ipv4_address: ${NGINX_EXTERNAL_IP:-172.18.10.10}

networks:
    app_internal:
        name: ${INTERNAL_NETWORK_NAME:-pdf2md_internal}
        external: ${INTERNAL_NETWORK_EXTERNAL:-false}
        # ❌ Se external=true, remova/comente até a linha 68:
        driver: ${INTERNAL_NETWORK_DRIVER:-bridge}
        ipam:
            driver: ${INTERNAL_NETWORK_IPAM_DRIVER:-default}
            config:
                - subnet: "${INTERNAL_NETWORK_SUBNET:-172.18.1.0/24}"
                  gateway: "${INTERNAL_NETWORK_GATEWAY:-172.18.1.1}"
        driver_opts:
            com.docker.network.driver.mtu: "${INTERNAL_NETWORK_MTU:-1500}"
        internal: ${INTERNAL_NETWORK_INTERNAL:-false}

    app_external:
        name: ${EXTERNAL_NETWORK_NAME:-pdf2md_external}
        external: ${EXTERNAL_NETWORK_EXTERNAL:-false}
        # ❌ Se external=true, remova/comente até a linha 82:
        driver: ${EXTERNAL_NETWORK_DRIVER:-bridge}
        internal: ${EXTERNAL_NETWORK_INTERNAL:-false}
        ipam:
            driver: ${EXTERNAL_NETWORK_IPAM_DRIVER:-default}
            config:
                - subnet: "${EXTERNAL_NETWORK_SUBNET:-172.18.10.0/24}"
                  gateway: "${EXTERNAL_NETWORK_GATEWAY:-172.18.10.1}"
        driver_opts:
            com.docker.network.driver.mtu: "${EXTERNAL_NETWORK_MTU:-1500}"

volumes:
    app_output:
        driver: local
        driver_opts:
            type: none
            o: bind
            device: ${HOST_OUTPUT_DIR:-../output}
